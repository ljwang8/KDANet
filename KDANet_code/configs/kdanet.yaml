seed: 42

data:
  root: ./data/CUG_MA
  train_dir: train
  val_dir: val
  test_dir: test
  image_size: 224
  num_classes: 9
  num_workers: 4
  class_names:
    - Mining Area
    - Coal Yard
    - Hillock
    - Mining Architecture
    - Gangue Dump
    - Tailing Pond
    - Refuse Dump
    - Mineral Processing Area
    - Transfer Site

model:
  student_width: x0_5
  student_feature_channels: 1024
  teacher_feature_channels: 1024
  distill_channels: 256
  canlam_reduction: 16

loss:
  contrastive_weight: 0.10
  relational_weight: 0.10
  feature_weight: 0.10
  classification_weight: 1.0
  contrastive_temperature: 0.07

train:
  epochs: 200
  batch_size: 16
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0001
  lr_step_size: 60
  lr_gamma: 0.1
  output_dir: runs/kdanet
  print_freq: 20

test:
  batch_size: 16
